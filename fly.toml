# Fly.io config for the EdgeCast API.
# `fly launch --copy-config --no-deploy` will pick this up; set your own app name.
app = "edgecast-api"
primary_region = "iad"

[build]

[mounts]
  source = "edgecast_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Stay always-on: the in-server daemon takes the 11 AM ET snapshot even
  # when nobody is viewing the dashboard.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
